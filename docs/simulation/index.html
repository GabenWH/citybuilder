<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simulation Docs Index</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --ink: #1f1f1f;
      --muted: #5a5a5a;
      --accent: #b75a2a;
      --panel: #ffffff;
      --border: #e2ddd4;
      --code: #f0ece6;
    }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    header {
      padding: 32px 24px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, var(--bg));
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    main { padding: 16px 24px 40px; max-width: 980px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin: 12px 0;
    }
    ul { padding-left: 20px; }
    .note { color: var(--muted); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Simulation Docs Index</h1>
    <p class="note">Quick links to all simulation documentation.</p>
  </header>
  <main>
    <div class="panel">
      <ul>
        <li><a href="overview.html">Simulation Overview</a></li>
        <li><a href="backend_api.html">Backend API</a></li>
        <li><a href="modes.html">Modes</a></li>
      </ul>
    </div>
  </main>
</body>
</html>
